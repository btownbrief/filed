name: Update BTown Brief headlines

on:
  schedule:
    # BTown Brief publishes Monday and Friday mornings (Eastern).
    # 14:30 UTC = 10:30 EDT / 09:30 EST — safely after the edition exists
    # in both daylight-saving regimes.
    - cron: '30 14 * * 1,5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch and extract headlines
        run: node scripts/update-headlines.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet data/headlines.json; then
            git config user.name "btown-brief-bot"
            git config user.email "actions@github.com"
            git add data/headlines.json
            git commit -m "Update BTown Brief headlines"
            git push
          else
            echo "No headline changes."
          fi
